name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Validate skill-rules.json parses
        run: node -e "JSON.parse(require('fs').readFileSync('skills/skill-rules.json','utf8')); console.log('skill-rules.json OK')"

      - name: Every skill directory has a SKILL.md with frontmatter
        run: |
          set -e
          fail=0
          for d in skills/*/; do
            f="${d}SKILL.md"
            if [ ! -f "$f" ]; then echo "missing: $f"; fail=1; continue; fi
            head -1 "$f" | grep -q '^---$' || { echo "no frontmatter: $f"; fail=1; }
            echo "ok: $f"
          done
          exit $fail

      - name: Every rule's skill resolves to a directory
        run: |
          node -e '
            const fs=require("fs");
            const rules=JSON.parse(fs.readFileSync("skills/skill-rules.json","utf8")).rules||[];
            let bad=0;
            for (const r of rules) {
              const p="skills/"+r.skill+"/SKILL.md";
              if(!fs.existsSync(p)){console.error("rule",r.id,"-> missing",p);bad=1;}
            }
            if(bad) process.exit(1);
            console.log("all",rules.length,"rules resolve to a SKILL.md");
          '
